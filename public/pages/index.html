<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/assets/css/main.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSM | Cadastro</title>
</head>
<body>
    <main class="card">
        <h1 class="title">Cadastro de Jogos da Mega-Sena</h1>
        <p class="helper-text">Digite 6 números entre 1 e 60 e pressione Enter para salvar.</p>
        <input class="sena-input" type="text" id="sena-input" placeholder="Ex.: 05 12 23 34 45 56" />
        <section class="result" id="result"></section>
        <section class="sena-list">
            <div class="sena-list-body" id="sena-list-body"></div>
        </section>
    </main>
    <script src="/assets/js/main.js"></script>
</body>
</html>
